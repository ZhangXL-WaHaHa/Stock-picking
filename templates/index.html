<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票筛选器</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
    <div class="container">
        <header>
            <h1>多策略股票筛选器</h1>
        </header>

        <div class="strategy-tabs" id="strategy-tabs"></div>
        <div class="strategy-desc" id="strategy-desc"></div>

        <details class="strategy-panel" id="strategy-panel">
            <summary class="strategy-toggle">筛选规则</summary>
            <div class="strategy-content" id="strategy-rules"></div>
        </details>

        <div class="toolbar">
            <button id="btn-screen" onclick="runScreen()">立即筛选</button>
            <span id="status"></span>
        </div>

        <div class="schedule-panel">
            <div class="schedule-header">
                <span class="schedule-title">定时筛选（一夜持股法）</span>
                <button class="btn-add-schedule" onclick="addScheduleRow()">+ 添加时间</button>
            </div>
            <div id="schedule-list">
                {% if schedules %}
                {% for s in schedules %}
                <div class="schedule-row" data-index="{{ loop.index0 }}">
                    <label class="switch">
                        <input type="checkbox" {% if s.enabled %}checked{% endif %} onchange="saveSchedules()">
                        <span class="slider"></span>
                    </label>
                    <span class="schedule-label">周一至周五</span>
                    <input type="time" value="{{ '%02d:%02d' | format(s.hour, s.minute) }}" onchange="saveSchedules()">
                    <button class="btn-remove-schedule" onclick="removeScheduleRow(this)">&times;</button>
                </div>
                {% endfor %}
                {% else %}
                <div class="schedule-row">
                    <label class="switch">
                        <input type="checkbox" checked onchange="saveSchedules()">
                        <span class="slider"></span>
                    </label>
                    <span class="schedule-label">周一至周五</span>
                    <input type="time" value="14:50" onchange="saveSchedules()">
                    <button class="btn-remove-schedule" onclick="removeScheduleRow(this)">&times;</button>
                </div>
                {% endif %}
            </div>
            <span id="schedule-status"></span>
        </div>

        <div id="winrate-panel" class="winrate-panel">
            <div class="winrate-header">胜率追踪</div>
            <div class="winrate-cards">
                <div class="winrate-card">
                    <span class="winrate-num" id="wr-total">0</span>
                    <span class="winrate-label">总场次</span>
                </div>
                <div class="winrate-card win">
                    <span class="winrate-num" id="wr-wins">0</span>
                    <span class="winrate-label">胜</span>
                </div>
                <div class="winrate-card loss">
                    <span class="winrate-num" id="wr-losses">0</span>
                    <span class="winrate-label">负</span>
                </div>
                <div class="winrate-card rate">
                    <span class="winrate-num" id="wr-rate">0%</span>
                    <span class="winrate-label">胜率</span>
                </div>
                <div class="winrate-card profit">
                    <span class="winrate-num" id="wr-profit">0%</span>
                    <span class="winrate-label">累计收益</span>
                </div>
                <div class="winrate-card pending">
                    <span class="winrate-num" id="wr-pending">0</span>
                    <span class="winrate-label">待结算</span>
                </div>
            </div>
            <div id="pending-trades"></div>
            <div id="recent-trades"></div>
            <div id="winrate-empty" class="winrate-empty">暂无交易记录，5星股票会自动纳入追踪</div>
        </div>

        <div id="results-area">
            <div class="empty-state">
                <p>暂无筛选结果，选择策略后点击「立即筛选」</p>
                <p class="hint">建议在交易日 14:30-15:00 尾盘时段执行筛选</p>
            </div>
        </div>
    </div>

    <button class="donate-fab" id="donate-fab" onclick="toggleDonate()">打赏</button>
    <div class="donate-popup" id="donate-popup">
        <div class="donate-header">
            <span>请作者喝杯咖啡 :)</span>
            <button class="donate-close" onclick="toggleDonate()">&times;</button>
        </div>
        <div class="donate-qrcodes">
            <div class="donate-item">
                <img src="/static/1e9d13b16e2c520096243e2f38b754db_compress.jpg" alt="微信收款码">
                <span>微信</span>
            </div>
            <div class="donate-item">
                <img src="/static/05903b5e59f212d261700d101fc197c8_compress.jpg" alt="支付宝收款码">
                <span>支付宝</span>
            </div>
        </div>
    </div>

    <script>
        let strategies = [];
        let currentStrategy = 'overnight';

        async function loadStrategies() {
            try {
                const resp = await fetch('/api/strategies');
                const data = await resp.json();
                if (Array.isArray(data)) {
                    strategies = data;
                }
            } catch (e) {
                console.error('加载策略失败:', e);
            }
            renderTabs();
            renderRules();
        }

        function renderTabs() {
            const container = document.getElementById('strategy-tabs');
            if (container.children.length === 0) {
                container.innerHTML = strategies.map(s =>
                    `<button class="strategy-tab ${s.id === currentStrategy ? 'active' : ''}"
                             data-id="${s.id}"
                             onclick="switchStrategy('${s.id}')"
                             title="${s.desc}">
                        ${s.name}
                    </button>`
                ).join('');
            } else {
                container.querySelectorAll('.strategy-tab').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.id === currentStrategy);
                });
            }
        }

        function renderRules() {
            const s = strategies.find(s => s.id === currentStrategy);
            if (!s) return;

            document.getElementById('strategy-desc').innerHTML =
                `<span class="strategy-desc-name">${s.name}</span><span class="strategy-desc-text">${s.desc}</span>`;

            const container = document.getElementById('strategy-rules');
            let html = '<div class="strategy-grid">';
            s.rules.forEach(r => {
                html += `<div class="strategy-item">
                    <span class="strategy-num">${r.num}</span>
                    <div><strong>${r.title}</strong><p>${r.desc}</p></div>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function switchStrategy(id) {
            currentStrategy = id;
            renderTabs();
            renderRules();
            document.getElementById('strategy-panel').open = true;
            loadLatest();
        }

        async function runScreen() {
            const btn = document.getElementById('btn-screen');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.textContent = '筛选中，请稍候...';
            status.className = 'loading';

            try {
                const resp = await fetch(`/api/screen?strategy=${currentStrategy}`);
                const data = await resp.json();
                if (data.success) {
                    status.textContent = `筛选完成！找到 ${data.total_found} 只股票`;
                    status.className = 'success';
                    renderResults(data);
                    loadWinrate();
                } else {
                    status.textContent = `筛选失败: ${data.message}`;
                    status.className = 'error';
                }
            } catch (e) {
                status.textContent = `网络错误: ${e.message}`;
                status.className = 'error';
            }
            btn.disabled = false;
        }

        function renderResults(data) {
            const area = document.getElementById('results-area');
            if (!data.results || data.results.length === 0) {
                area.innerHTML = `
                    <p class="result-meta">筛选时间：${data.screen_time} | 未找到符合条件的股票</p>
                    <div class="empty-state"><p>当前无符合全部条件的股票</p></div>`;
                return;
            }

            const s = strategies.find(s => s.id === currentStrategy);
            const cols = s ? s.columns : [];

            let html = `<p class="result-meta">筛选时间：${data.screen_time} | 共找到 <strong>${data.total_found}</strong> 只</p>`;
            html += '<table id="results-table"><thead><tr>';
            cols.forEach(c => { html += `<th>${c.label}</th>`; });
            html += '</tr></thead><tbody>';

            data.results.forEach(row => {
                const score = row.priority_score || 0;
                html += `<tr class="priority-${score}">`;
                cols.forEach(c => {
                    const val = row[c.key];
                    if (c.type === 'stars') {
                        html += `<td class="stars">${'★'.repeat(val)}${'☆'.repeat(5 - val)}</td>`;
                    } else if (c.type === 'themes') {
                        const tags = (val || '').split('、').filter(t => t).map(t => `<span class="theme-tag">${t}</span>`).join('');
                        html += `<td class="themes">${tags}</td>`;
                    } else if (c.format === 'percent') {
                        html += `<td>${Math.round((val || 0) * 100)}%</td>`;
                    } else {
                        let display = val != null ? val : '';
                        if (c.suffix && display !== '') display = display + c.suffix;
                        const cls = c.class ? ` class="${c.class}"` : (c.color === 'red' ? ' class="change"' : '');
                        if (c.color === 'red' && display !== '' && !String(display).startsWith('-')) display = '+' + display;
                        html += `<td${cls}>${display}</td>`;
                    }
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            area.innerHTML = html;
        }

        function addScheduleRow() {
            const list = document.getElementById('schedule-list');
            const div = document.createElement('div');
            div.className = 'schedule-row';
            div.innerHTML = `
                <label class="switch">
                    <input type="checkbox" checked onchange="saveSchedules()">
                    <span class="slider"></span>
                </label>
                <span class="schedule-label">周一至周五</span>
                <input type="time" value="14:50" onchange="saveSchedules()">
                <button class="btn-remove-schedule" onclick="removeScheduleRow(this)">&times;</button>`;
            list.appendChild(div);
            saveSchedules();
        }

        function removeScheduleRow(btn) {
            const list = document.getElementById('schedule-list');
            if (list.children.length <= 1) return;
            btn.closest('.schedule-row').remove();
            saveSchedules();
        }

        async function saveSchedules() {
            const rows = document.querySelectorAll('#schedule-list .schedule-row');
            const schedules = [];
            rows.forEach(row => {
                const enabled = row.querySelector('input[type="checkbox"]').checked;
                const time = row.querySelector('input[type="time"]').value;
                if (time) {
                    const [h, m] = time.split(':').map(Number);
                    schedules.push({ hour: h, minute: m, enabled });
                }
            });
            const st = document.getElementById('schedule-status');
            try {
                const resp = await fetch('/api/schedules', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(schedules),
                });
                const data = await resp.json();
                if (data.success) {
                    st.textContent = '已保存';
                    st.className = 'success';
                } else {
                    st.textContent = data.message;
                    st.className = 'error';
                }
                setTimeout(() => { st.textContent = ''; }, 2000);
            } catch (e) {
                st.textContent = '保存失败';
                st.className = 'error';
            }
        }

        async function loadLatest() {
            try {
                const resp = await fetch(`/api/latest?strategy=${currentStrategy}`);
                const data = await resp.json();
                if (data.screen_time && data.results && data.results.length > 0) {
                    renderResults(data);
                }
            } catch (e) {
                console.error(e);
            }
        }

        function toggleDonate() {
            const popup = document.getElementById('donate-popup');
            const fab = document.getElementById('donate-fab');
            const open = popup.classList.toggle('show');
            fab.classList.toggle('hide', open);
        }

        async function loadWinrate() {
            try {
                const resp = await fetch('/api/winrate');
                const data = await resp.json();
                const s = data.stats;

                document.getElementById('wr-total').textContent = s.total;
                document.getElementById('wr-wins').textContent = s.wins;
                document.getElementById('wr-losses').textContent = s.losses;
                document.getElementById('wr-rate').textContent = s.win_rate + '%';

                const profitEl = document.getElementById('wr-profit');
                profitEl.textContent = (s.total_profit > 0 ? '+' : '') + s.total_profit + '%';
                profitEl.style.color = s.total_profit >= 0 ? '#4ecdc4' : '#e63946';

                const pending = data.pending_trades || [];
                document.getElementById('wr-pending').textContent = pending.length;

                const emptyEl = document.getElementById('winrate-empty');
                const hasTrades = s.total > 0 || pending.length > 0;
                emptyEl.style.display = hasTrades ? 'none' : '';

                if (pending.length > 0) {
                    let html = '<div class="trades-section-title">待结算</div>';
                    html += '<table class="trades-table"><thead><tr><th>选股日期</th><th>代码</th><th>名称</th><th>买入价</th><th>状态</th></tr></thead><tbody>';
                    pending.forEach(t => {
                        html += `<tr class="trade-pending"><td>${t.pick_date}</td><td>${t.code}</td><td>${t.name}</td><td>${t.buy_price}</td><td class="trade-status-pending">待结算</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('pending-trades').innerHTML = html;
                } else {
                    document.getElementById('pending-trades').innerHTML = '';
                }

                const trades = data.recent_trades;
                if (trades.length > 0) {
                    let html = '<div class="trades-section-title">历史记录</div>';
                    html += '<table class="trades-table"><thead><tr><th>结算日期</th><th>代码</th><th>名称</th><th>买入价</th><th>卖出价</th><th>盈亏</th><th>分析</th></tr></thead><tbody>';
                    trades.forEach(t => {
                        const cls = t.result === 'win' ? 'trade-win' : 'trade-loss';
                        const sign = t.profit_pct > 0 ? '+' : '';
                        const analysis = t.analysis && t.result === 'loss'
                            ? t.analysis.split('|').map(r => `<span class="analysis-tag">${r}</span>`).join('')
                            : (t.result === 'win' ? '<span class="analysis-tag ok">正常</span>' : '');
                        html += `<tr class="${cls}"><td>${t.sell_date || t.pick_date}</td><td>${t.code}</td><td>${t.name}</td><td>${t.buy_price}</td><td>${t.sell_price}</td><td class="trade-pct">${sign}${t.profit_pct}%</td><td class="analysis-cell">${analysis}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('recent-trades').innerHTML = html;
                } else {
                    document.getElementById('recent-trades').innerHTML = '';
                }
            } catch (e) {
                console.error(e);
            }
        }

        loadStrategies().then(() => {
            loadLatest();
            loadWinrate();
        });
    </script>
</body>
</html>
